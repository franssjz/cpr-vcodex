<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPR-vCodex Tools</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #B621B4;
      --bg: #f7f7f8;
      --surface: #ffffff;
      --text: #111118;
      --muted: #666672;
      --line: #e5e5e8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f14;
        --surface: #181820;
        --text: #f4f4f6;
        --muted: #aaa7b0;
        --line: #30303a;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(680px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 28px;
      box-shadow: 0 18px 40px rgba(17, 17, 24, 0.10);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    .version {
      display: inline-flex;
      margin: 0 0 22px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 750;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      padding: 9px 14px;
      font-weight: 750;
      text-decoration: none;
    }

    a.secondary {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <h1>CPR-vCodex Tools</h1>
    <p>Small browser tools for CPR-vCodex. Everything runs locally in your browser.</p>
    <div class="version">Latest firmware: 1.2.0.37-cpr-vcodex</div>
    <div class="links">
      <a href="./flash.html">Auto Flash</a>
      <a class="secondary" href="./reading-stats-editor/">Reading Stats Editor</a>
    </div>
  </main>
</body>
</html>
