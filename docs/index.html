<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPR-vCodex Tools</title>
  <link rel="stylesheet" href="assets/site.css">
  <style>
    :root {
      color-scheme: light;
      --accent: #B621B4;
      --bg: #f7f7f8;
      --surface: #ffffff;
      --surface-2: #f1f1f4;
      --text: #111118;
      --muted: #666672;
      --line: #e5e5e8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f0f14;
      --surface: #181820;
      --surface-2: #22222b;
      --text: #f4f4f6;
      --muted: #aaa7b0;
      --line: #30303a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(180deg, var(--surface) 0, var(--bg) 360px);
      color: var(--text);
    }

    main {
      display: grid;
      width: min(720px, calc(100vw - 32px));
      min-height: calc(100vh - 72px);
      margin: 0 auto;
      place-items: center;
      padding: 44px 0;
    }

    .home-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 28px;
      box-shadow: 0 18px 40px rgba(17, 17, 24, 0.10);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    .version {
      display: inline-flex;
      margin: 0 0 22px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 750;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tool-link {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      padding: 9px 14px;
      font-weight: 750;
      text-decoration: none;
    }

    .tool-link.secondary {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-topbar">
      <a class="site-brand" href="./">CPR-vCodex Tools</a>
      <nav class="site-nav" aria-label="Tools">
        <a href="./" aria-current="page" data-site-i18n="navHome">Home</a>
        <a href="./reading-stats-editor/" data-site-i18n="navStats">Reading Stats Editor</a>
        <a href="./flash.html" data-site-i18n="navFlash">Auto Flash</a>
        <a href="https://github.com/franssjz/cpr-vcodex" data-site-i18n="navGithub">GitHub</a>
        <a href="https://ko-fi.com/franssjz" data-site-i18n="navSupport">Support</a>
      </nav>
      <div class="site-actions">
        <button class="site-control icon-only" data-role="theme-toggle" type="button" aria-label="Dark mode" title="Dark mode"><span data-role="theme-icon"></span></button>
        <select class="site-select" data-role="language-select" aria-label="Language"></select>
      </div>
    </div>
  </header>

  <main>
    <section class="home-card">
      <h1 data-site-i18n="homeTitle">CPR-vCodex Tools</h1>
      <p data-site-i18n="homeSubtitle">Small browser tools for CPR-vCodex. Everything runs locally in your browser.</p>
      <div class="version" data-site-i18n="latestFirmware">Latest firmware: 1.2.0.47-cpr-vcodex</div>
      <div class="links">
        <a class="tool-link" href="./flash.html" data-site-i18n="homeFlash">Auto Flash</a>
        <a class="tool-link secondary" href="./reading-stats-editor/" data-site-i18n="homeStats">Reading Stats Editor</a>
        <a class="tool-link secondary" href="https://github.com/franssjz/cpr-vcodex" data-site-i18n="homeGithub">GitHub</a>
      </div>
    </section>
  </main>

  <script src="assets/site.js"></script>
</body>
</html>
