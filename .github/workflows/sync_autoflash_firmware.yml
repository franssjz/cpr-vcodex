name: Sync Auto Flash Firmware

on:
  release:
    types: [published, released]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-autoflash-firmware:
    if: github.event_name == 'workflow_dispatch' || (!github.event.release.draft && !github.event.release.prerelease)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin master
          git checkout --force FETCH_HEAD
          git switch -C master

      - name: Sync firmware copy from latest stable release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync_autoflash_firmware.py --repo "${GITHUB_REPOSITORY}"

      - name: Commit synchronized auto-flash firmware
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Auto-flash firmware is already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/assets/site.js docs/index.html docs/flash.html docs/firmware/firmware.bin docs/firmware/manifest.json
          git commit -m "docs: sync auto-flash firmware to ${AUTOFLASH_VERSION}"
          git push
